<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inclusion Project</title>

  <!-- Poppins Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', Arial, sans-serif;
      background: #f7f7f7;
    }

    /* Header Banner */
    .header {
      background-color: #ec3072;
      padding: 0;
      text-align: center;
      padding: 20px;
      height: 13vh;
    }

    .header img {
      width: auto;
      height: 100%;
    }

    /* Container */
    .container {
      width: 100%;
      padding: 20px 16px;
      box-sizing: border-box;
    }

    /* Button Card */
    .card {
      display: flex;
      align-items: center;
      gap: 20px;
      max-width: 500px;
      margin: 0 auto 20px auto;
      background: #ffffff;
      padding: 16px;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      border-left: 6px solid #ec3072;
      transition: all 0.2s ease;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 14px rgba(0,0,0,0.15);
    }

    .card img {
      width: 45%;
      max-width: 140px;
      height: auto;
    }

    .card p {
      margin: 0;
      font-size: 24px;
      font-weight: 700;
      text-transform: uppercase;
      color: #231e55;
      line-height: 1.2;
    }

    a {
      text-decoration: none;
      display: block;
    }

    /* Mobile tweaks */
    @media (max-width: 500px) {
      .card {
        flex-direction: row;
      }

      .card p {
        font-size: 18px;
      }
    }
  </style>
</head>

<body>

  <!-- Header -->
  <div class="header">
    <img src="img/header.png" alt="Header Image">
  </div>

  <!-- Main Content -->
  <div class="container">

    <a href="https://www.inclusionproject.com.au/sign-up">
      <div class="card">
        <img src="img/newsletter_icon.png">
        <p>for patrons to sign up</p>
      </div>
    </a>

    <a href="https://www.melbournepark.com.au/plan-your-visit/maps/">
      <div class="card">
        <img src="img/map_icon.png">
        <p>map of venue</p>
      </div>
    </a>

    <a href="https://i.ibb.co/MDQKsgNL/ip-script-1.png">
      <div class="card">
        <img src="img/script_icon.png">
        <p>just in case you need me</p>
      </div>
    </a>

  </div>

</body>
</html>
